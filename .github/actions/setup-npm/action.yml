name: Setup NPM Packages
description: Setup required NPM packages with caching for pnpm
runs:
  using: composite
  steps:
  - name: Setup Tools
    uses: egose/actions/pnpm-packages@5b9b0f545e5b9e9af6ae82d57ea943acab3b9bba
    with:
      frozen: 'true'
      ignore-scripts: 'false'
      paths: |
        .
        community-nodes
        docker-compose/adaptivecard
        docker-compose/sdg-mock-app
        external-hooks
