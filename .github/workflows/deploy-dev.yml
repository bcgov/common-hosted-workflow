name: Deploy Dev

on:
  push:
    branches:
    - main
    paths-ignore:
    - workflows/merge.yml
    - docs/**
    - terraform/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  packages: write
  security-events: write

jobs:
  build-push-n8n:
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: bcgov/chwf
      docker-path: .

  build-push-adaptivecard:
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: bcgov/chwf-adaptivecard
      docker-path: docker-compose/adaptivecard

  build-push-sdg-mock-app:
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: bcgov/chwf-sdg-mock-app
      docker-path: docker-compose/sdg-mock-app

  deploy-devx-dev:
    name: Deploys DevX (Dev)
    uses: ./.github/workflows/deploy-devx.yml
    needs: [build-push-n8n]
    with:
      environment: dev
      tag: ${{ github.sha }}

  deploy-sdg-dev:
    name: Deploys SDG (Dev)
    uses: ./.github/workflows/deploy-sdg.yml
    needs: [build-push-n8n, build-push-sdg-mock-app]
    with:
      environment: dev
      tag: ${{ github.sha }}
