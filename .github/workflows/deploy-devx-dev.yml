name: Deploy DevX (Dev)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy"
        required: false
        type: string
        default: "latest"
      environment:
        description: "Deployment environment"
        required: true
        type: choice # Defines the input as a dropdown menu
        default: "dev"
        options: # List of allowed values
          - dev
          - test
          - prod
  workflow_call:
    inputs:
      tag:
        description: "Image tag to deploy"
        required: false
        type: string
        default: "main"
      environment:
        description: "Deployment environment"
        required: true
        type: string
        default: "dev"
jobs:
  deploy-devX:
    name: "Deploy devX-${{ inputs.environment }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: devx-${{ inputs.environment }}

    steps:
    - uses: hmarr/debug-action@f7318c783045ac39ed9bb497e22ce835fdafbfe6
    - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493

    - name: Authenticate and set context
      uses: redhat-actions/oc-login@dfbd9912672664f9df2023c1c16e07bcf306043c
      with:
        openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        namespace: ${{ vars.OPENSHIFT_NAMESPACE }}
        insecure_skip_tls_verify: true

    - name: Deploy apps with Helm chart
      run: |
        make upgrade \
        NAMESPACE=${{ vars.OPENSHIFT_NAMESPACE }} \
        IMAGE_TAG=${{ inputs.tag }} \
        CLUSTER=${{ contains(secrets.OPENSHIFT_SERVER,'golddr') && 'golddr' || 'gold' }} 

        kubectl rollout status deployment/chwf-n8n-main
        kubectl rollout status deployment/chwf-n8n-worker
        kubectl rollout status deployment/chwf-n8n-webhook
        kubectl rollout status deployment/chwf-n8n-runner
      working-directory: ./helm/main

  deploy-devX-dr:
    name: "Deploy devX-${{ inputs.environment }}dr"
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: devx-${{ inputs.environment }}dr

    steps:
    - uses: hmarr/debug-action@f7318c783045ac39ed9bb497e22ce835fdafbfe6
    - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493

    - name: Authenticate and set context
      uses: redhat-actions/oc-login@dfbd9912672664f9df2023c1c16e07bcf306043c
      with:
        openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        namespace: ${{ vars.OPENSHIFT_NAMESPACE }}
        insecure_skip_tls_verify: true

    - name: Deploy apps with Helm chart
      run: |
        make upgrade \
        NAMESPACE=${{ vars.OPENSHIFT_NAMESPACE }} \
        IMAGE_TAG=${{ inputs.tag }} \
        CLUSTER=${{ contains(secrets.OPENSHIFT_SERVER,'golddr') && 'golddr' || 'gold' }}

        kubectl rollout status deployment/chwf-n8n-main
        kubectl rollout status deployment/chwf-n8n-worker
        kubectl rollout status deployment/chwf-n8n-webhook
        kubectl rollout status deployment/chwf-n8n-runner
      working-directory: ./helm/main
