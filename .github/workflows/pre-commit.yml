name: Run pre-commit

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Setup Tools
      uses: ./.github/actions/setup-tools

    - name: Setup NPM Packages
      uses: ./.github/actions/setup-npm

    - name: Set executable permissions for local format scripts
      run: |
        chmod +x ./.bin/prettier.sh

    - name: Run pre-commit
      uses: egose/actions/precommit@68448c0027aeafe0a824f6c9b33fd875e77b844c
      with:
        config: .pre-commit-config.yaml
        commit-on-push: true
        commit-on-pr: false
