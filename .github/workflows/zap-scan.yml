name: OWASP ZAP Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Target URL to scan
        required: true
        type: choice
        default: https://test-chwf.apps.gold.devops.gov.bc.ca
        options:
        - https://dev-chwf.apps.gold.devops.gov.bc.ca
        - https://dev-chwf-sdg.apps.gold.devops.gov.bc.ca
        - https://test-chwf.apps.gold.devops.gov.bc.ca
        - https://n8n.developer.gov.bc.ca

jobs:
  zap-scan:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    steps:
    - name: ZAP Full Scan
      uses: zaproxy/action-full-scan@v0.12.0
      with:
        target: ${{ inputs.target_url }}
        fail_action: true
        artifact_name: zap_scan_report
