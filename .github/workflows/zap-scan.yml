name: OWASP ZAP Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Target URL to scan
        required: true
        type: choice
        default: https://test-chwf.apps.gold.devops.gov.bc.ca
        options:
        - https://dev-chwf.apps.gold.devops.gov.bc.ca
        - https://test-chwf.apps.gold.devops.gov.bc.ca
        - https://n8n.developer.gov.bc.ca
permissions:
  contents: read
  issues: write

jobs:
  zap-scan:
    name: ZAP Full Scan
    runs-on: ubuntu-latest
    steps:
    - name: ZAP Full Scan
      uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c
      with:
        target: ${{ inputs.target_url }}
        issue_title: ZAP Scan - ${{ inputs.target_url }}
        fail_action: false
        artifact_name: zap_scan_report
