sonar.projectKey=bcgov_chwf
sonar.organization=bcgov-sonarcloud

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=chwf
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# enabling python3 only to take advantage of sonarqube's stricter analysis
sonar.python.version=3

# sonar.coverage.exclusions=

# Exclude test files from copy-paste / duplication detection.
# Test code is intentionally repetitive for readability and isolation.
sonar.cpd.exclusions=**/tests/**,**/*.test.ts,**/*.spec.ts,**/*.test.js,**/*.spec.js

# S6653: "Use Object.hasOwn() instead of Object.prototype.hasOwnProperty.call()"
# Our tsconfig lib target is pre-ES2022 (controlled by n8n build toolchain).
# Object.prototype.hasOwnProperty.call() is the standard equivalent for this environment.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6653
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts
