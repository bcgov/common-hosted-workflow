<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHEFS Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f5f5f5;
      }
      main {
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
        min-height: 100vh;
      }
      .form-container {
        width: 100%;
        max-width: 960px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 2rem;
      }
    </style>
    <script src="https://submit.digital.gov.bc.ca/app/embed/chefs-form-viewer.min.js"></script>
  </head>
  <body>
    <main>
      <div class="form-container">
        <chefs-form-viewer
          form-id="2fe4a6a5-052d-4867-ab6b-c54f46a86422"
          api-key="cb8d4531-e520-45cf-8d2f-92853faed3f5"
          base-url="https://submit.digital.gov.bc.ca/app"
          language="en"
          isolate-styles
        ></chefs-form-viewer>

        <script>
          const viewer = document.querySelector('chefs-form-viewer');
          viewer.load();

          viewer.addEventListener('formio:submitDone', async (e) => {
            try {
              const response = await fetch('http://localhost:5678/webhook/receive-contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(e.detail.submission),
              });
              if (!response.ok) throw new Error('Webhook failed: ' + response.status);
              console.log('Submission sent to webhook successfully');
            } catch (err) {
              console.error('Failed to send submission to webhook:', err);
            }
          });
        </script>
      </div>
    </main>
  </body>
</html>
