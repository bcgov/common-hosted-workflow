image:
  repository: grafana/mimir
  tag: '2.14.0'
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: mimir

serviceAccountName: ""

replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: null  # OpenShift assigns UID from namespace range

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}

deploymentStrategy:
  type: Recreate

service:
  type: ClusterIP

storage:
  s3:
    insecure: true
    endpoint: ''
    blocksBucket: ''
    alertmanagerBucket: ''
    rulerBucket: ''

envSecretName: ""

env: {}

extraEnv: []

livenessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5

resources:
  requests:
    cpu: 10m
    memory: 128Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 256Mi
