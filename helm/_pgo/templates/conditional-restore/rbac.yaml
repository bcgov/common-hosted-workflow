{{- if .Values.conditionalRestore.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "_.fullname" . }}-restore-runner
  labels:
    {{- include "_.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "_.fullname" . }}-restore-runner
  labels:
    {{- include "_.labels" . | nindent 4 }}
rules:
  - apiGroups: ["postgres-operator.crunchydata.com"]
    resources: ["postgresclusters"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "_.fullname" . }}-restore-state"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "_.fullname" . }}-restore-runner
  labels:
    {{- include "_.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "_.fullname" . }}-restore-runner
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "_.fullname" . }}-restore-runner
{{- end }}
