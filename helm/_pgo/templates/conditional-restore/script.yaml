{{- if .Values.conditionalRestore.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "_.fullname" . }}-restore-script
  labels:
    {{- include "_.labels" . | nindent 4 }}
data:
  restore.sh: |
    #!/bin/bash
    set -eo pipefail

    log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }

    KUBE_API="https://kubernetes.default.svc"
    KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    KUBE_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
    KUBE_CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    log "pg-conditional-restore starting..."

    # --- 1. Check DR failover status ---
    log "Querying DNS probe: ${DNS_PROBE_STATUS_URL}"

    HTTP_STATUS=$(curl -sf --max-time 10 \
      -o /tmp/probe_response.json \
      -w "%{http_code}" \
      "${DNS_PROBE_STATUS_URL}" 2>/dev/null || echo "000")

    if [ "${HTTP_STATUS}" != "200" ]; then
      log "WARNING: DNS probe returned HTTP ${HTTP_STATUS}. Assuming DR_FAILOVER=true (safe default). Exiting."
      exit 0
    fi

    # Parse current_routing from dns-probe:
    #   "primary"   = DNS resolves to Gold → GoldDR is standby → restore
    #   "secondary" = DNS resolves to GoldDR → GoldDR is active primary → skip
    #   "unknown"   = DNS not configured / unrecognised IP → skip (safe default)
    if grep -q '"current_routing": *"secondary"' /tmp/probe_response.json 2>/dev/null; then
      ROUTING="secondary"
    elif grep -q '"current_routing": *"primary"' /tmp/probe_response.json 2>/dev/null; then
      ROUTING="primary"
    else
      log "WARNING: Could not parse current_routing from probe response. Assuming safe default (skip restore)."
      cat /tmp/probe_response.json
      exit 0
    fi

    DURATION=$(grep -o '"duration_seconds": *[0-9]*' /tmp/probe_response.json | grep -o '[0-9]*$' || echo "0")
    log "current_routing=${ROUTING} duration_seconds=${DURATION}"

    # --- 2. Condition A: GoldDR is the active primary (DNS failover) — skip restore ---
    if [ "${ROUTING}" = "secondary" ]; then
      log "GoldDR is the active primary (current_routing=secondary). Skipping restore."
      exit 0
    fi

    # --- 2b. Condition B: Gold routing is too recent — skip restore until stable ---
    # Avoids restoring mid-failover when Gold may not yet be fully recovered.
    if [ "${DURATION}" -lt 600 ]; then
      log "Gold routing has only been stable for ${DURATION}s (< 600s). Skipping restore until stable for 10 minutes."
      exit 0
    fi

    # --- 3. Condition C: GoldDR is standby — restore each database if a new backup exists ---
    log "GoldDR is in standby mode (current_routing=primary). Checking for new backups..."

    # S3_BUCKET is "bucket-name/path/prefix" — split for API calls
    S3_BUCKET_NAME=$(echo "${S3_BUCKET}" | cut -d'/' -f1)
    S3_PREFIX=$(echo "${S3_BUCKET}" | cut -d'/' -f2- | sed 's:/*$:/:')

    # Fetch full S3 listing once (all databases share the same prefix)
    S3_LIST=$(curl -sf --aws-sigv4 "aws:amz:us-east-1:s3" \
      -u "${S3_USER}:${S3_PASSWORD}" \
      "${S3_ENDPOINT}/${S3_BUCKET_NAME}?list-type=2&prefix=${S3_PREFIX}" 2>&1 || true)

    rm -f /tmp/probe_response.json

    # --- 4. Iterate each database: find its latest backup, compare state, restore if new ---
    for i in $(seq 0 $((DATABASE_COUNT-1))); do
      DB_NAME_VAR="DATABASE_${i}_NAME"; DB_NAME="${!DB_NAME_VAR}"
      DB_PASS="${DB_PASSWORD}" # pragma: allowlist secret

      log "[${DB_NAME}] Checking for latest backup..."

      # Find the latest S3 key whose filename contains the database name
      LATEST_KEY=$(echo "${S3_LIST}" \
        | grep -o '<Key>[^<]*</Key>' \
        | sed 's/<Key>//;s/<\/Key>//' \
        | grep -v '/$' \
        | grep "${DB_NAME}" \
        | sort \
        | tail -1 || true)

      if [ -z "${LATEST_KEY}" ]; then
        log "[${DB_NAME}] WARNING: No backup files found matching '${DB_NAME}' at ${S3_ENDPOINT}/${S3_BUCKET_NAME}/${S3_PREFIX}. Skipping."
        continue
      fi

      log "[${DB_NAME}] Latest backup on S3: ${LATEST_KEY}"

      # Read the last restored key for this specific database from the state ConfigMap
      STATE_KEY="${DB_NAME}.last-restored-key"
      LAST_KEY=$(curl -sf --cacert "${KUBE_CACERT}" \
        -H "Authorization: Bearer ${KUBE_TOKEN}" \
        "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/configmaps/${STATE_CONFIGMAP_NAME}" \
        2>/dev/null \
        | grep -o "\"${STATE_KEY}\":\"[^\"]*\"" \
        | head -1 \
        | cut -d'"' -f4 || echo "")

      log "[${DB_NAME}] Last restored key: ${LAST_KEY:-<none>}"

      if [ "${LATEST_KEY}" = "${LAST_KEY}" ]; then
        log "[${DB_NAME}] Latest backup already restored. Skipping."
        continue
      fi

      # New backup detected — download, verify, then restore
      log "[${DB_NAME}] New backup detected. Downloading ${LATEST_KEY}..."
      curl -sf --aws-sigv4 "aws:amz:us-east-1:s3" \
        -u "${S3_USER}:${S3_PASSWORD}" \
        -o /tmp/restore.sql.gz \
        "${S3_ENDPOINT}/${S3_BUCKET_NAME}/${LATEST_KEY}"

      log "[${DB_NAME}] Verifying downloaded archive..."
      gunzip -t /tmp/restore.sql.gz

      # Drop schema only after confirming the backup file is intact
      log "[${DB_NAME}] Dropping and recreating public schema..."
      PGPASSWORD="${DB_PASS}" psql \
        -h "${DB_HOST}" \
        -p "${DB_PORT}" \
        -U "${DB_USER}" \
        -d "${DB_NAME}" \
        -c "DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public;" || true

      log "[${DB_NAME}] Restoring from downloaded backup..."
      gunzip -c /tmp/restore.sql.gz | PGPASSWORD="${DB_PASS}" psql \
        -h "${DB_HOST}" \
        -p "${DB_PORT}" \
        -U "${DB_USER}" \
        -d "${DB_NAME}" \
        -v ON_ERROR_STOP=0

      rm -f /tmp/restore.sql.gz
      log "[${DB_NAME}] Restore complete."

      # Update per-database state key
      log "[${DB_NAME}] Updating restore state (${STATE_KEY}=${LATEST_KEY})..."
      curl -sf --cacert "${KUBE_CACERT}" \
        -X PATCH \
        -H "Authorization: Bearer ${KUBE_TOKEN}" \
        -H "Content-Type: application/merge-patch+json" \
        "${KUBE_API}/api/v1/namespaces/${KUBE_NS}/configmaps/${STATE_CONFIGMAP_NAME}" \
        -d "{\"data\":{\"${STATE_KEY}\":\"${LATEST_KEY}\"}}" \
        > /dev/null
    done

    log "pg-conditional-restore done."
{{- end }}
