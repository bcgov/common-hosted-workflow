apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "_.fullname" . }}-init-sql
  labels:
    {{- include "_.labels" . | nindent 4 }}
data:
  init.sql: |
    {{- range $user := .Values.users }}
    {{- range $db := $user.databases }}
    -- Initialize database: {{ $db }} (owner: {{ $user.name }})
    \c "{{ $db }}"
    ALTER SCHEMA public OWNER TO "{{ $user.name }}";
    {{- if not (contains "SUPERUSER" ($user.options | default "")) }}
    ALTER USER "{{ $user.name }}" NOSUPERUSER;
    {{- end }}
    GRANT ALL ON SCHEMA public TO "{{ $user.name }}";
    {{- end }}
    {{- end }}
