{{- $config := .Values.config | default (dict) }}
{{- $configFiles := get $config "files" | default (list) }}
{{- $configParameters := get $config "parameters" | default (dict) }}
{{- $instances := .Values.instances | default (list) }}
{{- $dataSource := .Values.dataSource | default (dict) }}
{{- $monitoring := .Values.monitoring | default (dict) }}
{{- $pgmonitor := get $monitoring "pgmonitor" | default (dict) }}
{{- $pgmonitorWithoutExporter := omit $pgmonitor "exporter" }}
{{- $pgmonitorExporter := get $pgmonitor "exporter" | default (dict) }}
{{- $pgmonitorExporterSanitized := $pgmonitorExporter }}
{{- if not (get $pgmonitorExporter "image") }}{{- $pgmonitorExporterSanitized = omit $pgmonitorExporterSanitized "image" }}{{- end }}
{{- $patroni := .Values.patroni | default (dict) }}
{{- $patroniDynamicConfiguration := get $patroni "dynamicConfiguration" | default (dict) }}
{{- $patroniDynamicConfigurationWithoutPostgresql := omit $patroniDynamicConfiguration "postgresql" }}
{{- $patroniPostgresql := get $patroniDynamicConfiguration "postgresql" | default (dict) }}
{{- $patroniPostgresqlWithoutRecoveryConf := omit $patroniPostgresql "recovery_conf" }}
{{- $pgBackRest := .Values.pgBackRest | default (dict) }}
{{- $pgBouncer := .Values.pgBouncer | default (dict) }}
{{- $users := .Values.users | default (list) }}
{{- $hasPostgres := false }}
{{- range $user := $users }}
{{-   if eq $user.name "postgres" }}{{- $hasPostgres = true }}{{- end }}
{{- end }}
{{- $openshift := true }}
{{- if hasKey .Values "openshift" }}{{- $openshift = .Values.openshift }}{{- end }}
{{- $defaultRepoName := "" }}
{{- range (get $pgBackRest "repos" | default (list)) }}
  {{- if and (eq $defaultRepoName "") (not (eq .enabled false)) }}{{- $defaultRepoName = .name }}{{- end }}
{{- end }}
# See https://access.crunchydata.com/documentation/postgres-operator/latest/references/crd/6.0.x/postgrescluster-v1
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: {{ include "_.fullname" . }}
  labels:
    {{- include "_.labels" . | nindent 4 }}
spec:
  {{- $hasBackups := false }}
  {{- if $pgBackRest }}
    {{- if or (get $pgBackRest "repos") (get $pgBackRest "configuration") (get $pgBackRest "global") }}
      {{- $hasBackups = true }}
    {{- end }}
  {{- end }}
  {{- if $hasBackups }}
  backups:
    pgbackrest:
      {{- $configs := get $pgBackRest "configuration" | default (list) }}
      {{- range (get $pgBackRest "repos" | default (list)) }}
        {{- if and (not (eq .enabled false)) .secretName }}
          {{- $configs = append $configs (dict "secret" (dict "name" .secretName)) }}
        {{- end }}
      {{- end }}

      {{- $global := dict }}
      {{- range $key, $value := (get $pgBackRest "global" | default (dict)) }}
        {{- $_ := set $global $key $value }}
      {{- end }}
      {{- range $repo := (get $pgBackRest "repos" | default (list)) }}
        {{- if not (eq $repo.enabled false) }}
          {{- $repoRetention := get $repo "retention" }}
          {{- $repoRetentionFullKey := printf "%s-retention-full" $repo.name }}
          {{- $repoRetentionFullTypeKey := printf "%s-retention-full-type" $repo.name }}
          {{- if kindIs "map" $repoRetention }}
            {{- with get $repoRetention "full" }}
              {{- if not (hasKey $global $repoRetentionFullKey) }}{{- $_ := set $global $repoRetentionFullKey (. | toString) }}{{- end }}
            {{- end }}
            {{- with get $repoRetention "fullType" }}
              {{- if not (hasKey $global $repoRetentionFullTypeKey) }}{{- $_ := set $global $repoRetentionFullTypeKey . }}{{- end }}
            {{- end }}
          {{- else }}
            {{- with $repoRetention }}
              {{- if not (hasKey $global $repoRetentionFullKey) }}{{- $_ := set $global $repoRetentionFullKey (. | toString) }}{{- end }}
            {{- end }}
            {{- with $repo.retentionType }}
              {{- if not (hasKey $global $repoRetentionFullTypeKey) }}{{- $_ := set $global $repoRetentionFullTypeKey . }}{{- end }}
            {{- end }}
          {{- end }}

          {{- $repoPath := get $repo "path" }}
          {{- if and (not $repoPath) $repo.s3 }}{{- $repoPath = get $repo.s3 "path" }}{{- end }}
          {{- if and (not $repoPath) $repo.azure }}{{- $repoPath = get $repo.azure "path" }}{{- end }}
          {{- if and (not $repoPath) $repo.gcs }}{{- $repoPath = get $repo.gcs "path" }}{{- end }}
          {{- $repoPathKey := printf "%s-path" $repo.name }}
          {{- with $repoPath }}
            {{- if not (hasKey $global $repoPathKey) }}{{- $_ := set $global $repoPathKey . }}{{- end }}
          {{- end }}

          {{- if $repo.s3 }}
            {{- $repoUriStyle := (get $repo "uriStyle") | default (get $repo.s3 "uriStyle") | default "host" }}
            {{- $repoUriStyleKey := printf "%s-s3-uri-style" $repo.name }}
            {{- if not (hasKey $global $repoUriStyleKey) }}{{- $_ := set $global $repoUriStyleKey $repoUriStyle }}{{- end }}
          {{- end }}

          {{- if $repo.azure }}
            {{- $repoAzureAccount := (get $repo "azureAccount") | default (get $repo.azure "accountName") | default (get $repo.azure "account") }}
            {{- $repoAzureAccountKey := printf "%s-azure-account" $repo.name }}
            {{- with $repoAzureAccount }}
              {{- if not (hasKey $global $repoAzureAccountKey) }}{{- $_ := set $global $repoAzureAccountKey . }}{{- end }}
            {{- end }}
          {{- end }}

          {{- if and $repo.gcs $repoPath }}
            {{- $repoGcsKeyTypeKey := printf "%s-gcs-key-type" $repo.name }}
            {{- if not (hasKey $global $repoGcsKeyTypeKey) }}{{- $_ := set $global $repoGcsKeyTypeKey ((get $repo "gcsKeyType") | default "service-account") }}{{- end }}
          {{- end }}
        {{- end }}
      {{- end }}

      {{- if $configs }}
      configuration:
      {{ toYaml $configs | nindent 8 }}
      {{- end }}

      {{- if $global }}
      # See https://pgbackrest.org/configuration.html#section-repository/option-repo-retention-full
      global:
        {{- toYaml $global | nindent 8 }}
      {{- end }}

      {{- if $pgBackRest.image }}
      image: {{ $pgBackRest.image }}
      {{- end }}

      {{- with $pgBackRest.jobs }}
      jobs:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $pgBackRest.log }}
      log:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $pgBackRest.manual }}
      manual:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $pgBackRest.metadata }}
      metadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $pgBackRest.repoHost }}
      repoHost:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      repos:
        {{- range (get $pgBackRest "repos" | default (list)) }}
        {{- if not (eq .enabled false) }}
        - name: {{ .name }}
          {{- with .schedules }}
          schedules:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .volume }}
          {{- $repoVolume := . }}
          volume:
            {{- if hasKey $repoVolume "volumeClaimSpec" }}
            {{- toYaml $repoVolume | nindent 12 }}
            {{- else }}
            volumeClaimSpec:
              {{- $repoAccessModes := get $repoVolume "accessModes" | default (list "ReadWriteOnce") }}
              accessModes:
                {{- if kindIs "slice" $repoAccessModes }}
                {{- toYaml $repoAccessModes | nindent 16 }}
                {{- else }}
                - {{ $repoAccessModes | quote }}
                {{- end }}
              resources:
                {{- if hasKey $repoVolume "resources" }}
                {{- toYaml (get $repoVolume "resources") | nindent 16 }}
                {{- else }}
                requests:
                  storage: {{ get $repoVolume "size" }}
                {{- end }}
              {{- with get $repoVolume "storageClassName" }}
              storageClassName: {{ . }}
              {{- end }}
            {{- end }}
          {{- end }}

          {{- with .s3 }}
          {{- $repoS3 := omit . "path" "uriStyle" }}
          {{- if $repoS3 }}
          s3:
            {{- toYaml $repoS3 | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .azure }}
          {{- $repoAzure := omit . "path" "accountName" "account" }}
          {{- if $repoAzure }}
          azure:
            {{- toYaml $repoAzure | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .gcs }}
          {{- $repoGcs := omit . "path" }}
          {{- if $repoGcs }}
          gcs:
            {{- toYaml $repoGcs | nindent 12 }}
          {{- end }}
          {{- end }}

        {{- end }}
        {{- end }}

      {{- with $pgBackRest.restore }}
      restore:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $pgBackRest.sidecars }}
      sidecars:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- end }}

  {{- if or $configFiles $configParameters }}
  config:
    # Keep ordinary PostgreSQL settings here.
    # This chart passes through supported spec.config fields from values.yaml.
    {{- with $configFiles }}
    files:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $configParameters }}
    parameters:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- if or $dataSource.pgbackrest $dataSource.postgresCluster }}
  dataSource:
    {{- with $dataSource.pgbackrest }}
    pgbackrest:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $dataSource.postgresCluster }}
    postgresCluster:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  databaseInitSQL:
    key: init.sql
    name: {{ include "_.fullname" . }}-init-sql

  instances:
  {{- range $instance := $instances }}
  - affinity:
      {{- with $instance.affinity }}
      {{- toYaml . | nindent 6 }}
      {{- else }}
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              topologyKey: topology.kubernetes.io/zone
              labelSelector:
                matchLabels:
                  postgres-operator.crunchydata.com/cluster: {{ include "_.fullname" $ }}
                  postgres-operator.crunchydata.com/instance-set: {{ $instance.name }}
      {{- end }}
    {{- with $instance.containers }}
    containers:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    dataVolumeClaimSpec:
      {{- toYaml $instance.dataVolumeClaimSpec | nindent 6 }}
    {{- with $instance.metadata }}
    metadata:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.minAvailable }}
    minAvailable: {{ . }}
    {{- end }}
    {{- with $instance.name }}
    name: {{ . }}
    {{- end }}
    {{- with $instance.priorityClassName }}
    priorityClassName: {{ . }}
    {{- end }}
    {{- with $instance.replicas }}
    replicas: {{ . }}
    {{- end }}
    {{- with $instance.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.sidecars }}
    sidecars:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.topologySpreadConstraints }}
    topologySpreadConstraints:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.volumes }}
    volumes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $instance.walVolumeClaimSpec }}
    walVolumeClaimSpec:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}

  {{- if or $pgmonitorWithoutExporter $pgmonitorExporterSanitized }}
  monitoring:
    pgmonitor:
      {{- with $pgmonitorWithoutExporter }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with $pgmonitorExporterSanitized }}
      exporter:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- end }}

  openshift: {{ $openshift }}

  {{- if or $patroni.leaderLeaseDurationSeconds $patroni.logging $patroni.port $patroni.switchover $patroni.syncPeriodSeconds $patroniDynamicConfiguration .Values.standby.enabled }}
  patroni:
    # Keep Patroni-managed behavior here.
    # This includes pg_hba, recovery behavior, switchover, and other Patroni dynamic settings.
    {{- with $patroni.leaderLeaseDurationSeconds }}
    leaderLeaseDurationSeconds: {{ . }}
    {{- end }}
    {{- with $patroni.logging }}
    logging:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $patroni.port }}
    port: {{ . }}
    {{- end }}
    {{- with $patroni.switchover }}
    switchover:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $patroni.syncPeriodSeconds }}
    syncPeriodSeconds: {{ . }}
    {{- end }}
    {{- if or $patroniDynamicConfigurationWithoutPostgresql $patroniPostgresqlWithoutRecoveryConf .Values.standby.enabled }}
    dynamicConfiguration:
      {{- with $patroniDynamicConfigurationWithoutPostgresql }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if or $patroniPostgresqlWithoutRecoveryConf .Values.standby.enabled }}
      postgresql:
        {{- if .Values.standby.enabled }}
        recovery_conf:
          recovery_target_timeline: latest
        {{- end }}
        {{- with $patroniPostgresqlWithoutRecoveryConf }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}

  postgresVersion: {{ .Values.postgresVersion }}

  {{ if $pgBouncer.enabled }}
  proxy:
    pgBouncer:
      {{- with $pgBouncer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchLabels:
                    postgres-operator.crunchydata.com/cluster: {{ include "_.fullname" . }}
                    postgres-operator.crunchydata.com/role: pgbouncer
      {{ end }}
      {{- with $pgBouncer.config }}
      config:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.containers }}
      containers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.customTLSSecret }}
      customTLSSecret:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{ if $pgBouncer.image }}
      image: {{ $pgBouncer.image }}
      {{ end }}
      {{- with $pgBouncer.metadata }}
      metadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.minAvailable }}
      minAvailable: {{ . }}
      {{- end }}
      {{- with $pgBouncer.port }}
      port: {{ . }}
      {{- end }}
      {{- with $pgBouncer.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      replicas: {{ $pgBouncer.replicas }}
      {{- with $pgBouncer.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.service }}
      service:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.sidecars }}
      sidecars:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $pgBouncer.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{ end }}

  {{- with .Values.standby }}
  standby:
    {{- $standby := . }}
    {{- if and (not (hasKey $standby "repoName")) $defaultRepoName }}
    {{- toYaml (merge (dict "repoName" $defaultRepoName) $standby) | nindent 4 }}
    {{- else }}
    {{- toYaml $standby | nindent 4 }}
    {{- end }}
  {{- end }}

  {{- if $users }}
  users:
    {{- range $user := $users }}{{ toYaml (list $user) | nindent 4 }}{{- end }}{{- if not $hasPostgres }}
    - name: postgres
      databases:
        - postgres
      options: SUPERUSER
    {{- end }}
  {{- end }}
