# --- High Availability & Patroni Configuration ---
# Maps to spec.patroni in the Crunchy PostgresCluster CRD.
# Put Patroni-managed behavior here, not ordinary PostgreSQL tuning.
patroni:
  # leaderLeaseDurationSeconds: 30
  # port: 8008
  # syncPeriodSeconds: 10
  # logging:
  #   level: INFO
  #   storageLimit: 100Mi
  # switchover:
  #   enabled: false
  dynamicConfiguration:
    postgresql:
      pg_hba:
        - host all all 0.0.0.0/0 scram-sha-256
      # Patroni-managed PostgreSQL settings can go here when needed.
      # Prefer config.parameters for normal PostgreSQL tuning.
      # parameters:
      #   max_connections: 200
      # use_slots: true
      # use_pg_rewind: true

# --- Connection Pooling (PgBouncer) ---
# Maps to spec.proxy.pgBouncer in the Crunchy PostgresCluster CRD.
pgBouncer:
  enabled: true
  config:
    global:
      client_tls_sslmode: disable
      auth_type: scram-sha-256
  image:
  replicas: 2
  # affinity:
  #   podAntiAffinity:
  #     preferredDuringSchedulingIgnoredDuringExecution:
  #       - weight: 1
  #         podAffinityTerm:
  #           topologyKey: topology.kubernetes.io/zone
  #           labelSelector:
  #             matchLabels:
  #               postgres-operator.crunchydata.com/cluster: pgo
  #               postgres-operator.crunchydata.com/role: pgbouncer
  # metadata:
  #   labels: {}
  # minAvailable: 1
  # port: 5432
  # priorityClassName: postgres-proxy
  resources:
    requests:
      cpu: 1m
      memory: 64Mi
  # service:
  #   type: ClusterIP
  # sidecars: {}
  # tolerations: []
  # topologySpreadConstraints: []
  # volumes: {}

# --- Standby / Disaster Recovery ---
# Maps directly to spec.standby.
standby:
  enabled: false
  # repoName defaults to the first enabled pgBackRest repo when omitted.
  repoName: repo1
  # host: source-cluster-primary.example.com
  # port: 5432

# --- Database Users ---
# Maps directly to spec.users.
# The legacy databases helper above is still supported for compatibility.
users:
  - name: postgres
    databases:
      - postgres
    options: SUPERUSER
  # - name: app
  #   databases:
  #     - app
  #   options: CREATEROLE NOSUPERUSER

# --- Conditional Restore (DR) ---
# Runs on GoldDR only. Checks DNS probe every 10 min and restores from Gold's S3 pg_dump backup
# when GoldDR is in standby mode (DR_FAILOVER=false).
conditionalRestore:
  enabled: false
  image:
    repository: ghcr.io/bcgov/backup-container
    tag: latest
    pullPolicy: IfNotPresent
  schedule: "*/5 * * * *"
  dnsProbStatusUrl: "http://chwf-dns-probe:8000/status"  # NOSONAR - internal k8s service, safe within cluster
  s3:
    endpoint: https://commonservices.objectstore.gov.bc.ca
    bucket: ""
    # Secret must have keys: access-key, secret-key (same secret used by backup-storage on Gold)
    secretName: chwf-s3-account  # pragma: allowlist secret
  # Uses the postgres superuser to restore all databases in pgo.databases.
  # Connects via chwf-pgo-replicas (read-only replica service) for backup,
  # and directly to primary for restore operations.
  db:
    secretName: chwf-pgo-pguser-postgres # pragma: allowlist secret
    usernameKey: user
    passwordKey: password # pragma: allowlist secret
    hostKey: host
    portKey: port

# --- Monitoring ---
monitoring:
  pgmonitor:
    exporter:
      image:
      resources:
        requests:
          cpu: 1m
          memory: 64Mi
    # queries can be projected via configuration:
    # exporter:
    #   configuration:
    #     - configMap:
    #         name: postgres-exporter-queries
