nameOverride: pgo
fullnameOverride: pgo

# --- General Cluster Settings ---
postgresVersion: 17

# Set to false when rendering for non-OpenShift Kubernetes clusters.
openshift: true

# --- PostgreSQL Server Configuration ---
# Maps to spec.config in the Crunchy PostgresCluster CRD.
# Put ordinary PostgreSQL GUCs here.
# Avoid duplicating these values under patroni.dynamicConfiguration.postgresql.parameters.
# These defaults are intentionally conservative for a tiny cluster.
# When the cluster grows, raise pod resources and PostgreSQL memory/WAL settings together.
# Example:
# helm upgrade <release> ./helm/_pgo --reuse-values \
#   --set instances[0].resources.requests.memory=1Gi \
#   --set config.parameters.shared_buffers=256MB \
#   --set config.parameters.work_mem=8MB \
#   --set config.parameters.wal_buffers=-1 \
#   --set config.parameters.min_wal_size=512MB \
#   --set config.parameters.max_wal_size=2GB
config:
  # files:
  #   - secret:
  #       name: postgres-extra-config
  parameters:
    # See PostgreSQL runtime config docs for valid GUC names and units.
    max_parallel_workers: "2"
    shared_buffers: 32MB # conservative default for small clusters; increase with pod memory
    work_mem: 2MB
    wal_buffers: -1 # keep PostgreSQL auto-sizing enabled as the cluster grows
    min_wal_size: 32MB
    max_wal_size: 128MB # conservative tiny-cluster default; increase for heavier write volume
    password_encryption: scram-sha-256 # pragma: allowlist secret

# Legacy helper that generates users entries automatically.
# Prefer values.users for new config. Avoid defining the same logical user in both places.
databases: []
  # - name: inventory
  #   options: CREATEROLE
  # - name: analytics
  #   options: NOSUPERUSER
  # - name: billing

# --- Instance Configuration ---
# Maps directly to spec.instances in the Crunchy PostgresCluster CRD.
# When scaling up, increase CPU/memory here first, then raise config.parameters to match.
# Example:
# helm upgrade <release> ./helm/_pgo --reuse-values \
#   --set instances[0].replicas=3 \
#   --set instances[0].resources.requests.cpu=500m \
#   --set instances[0].resources.requests.memory=2Gi
instances:
  - name: ha
    replicas: 2
    # affinity:
    #   podAntiAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 1
    #         podAffinityTerm:
    #           topologyKey: topology.kubernetes.io/zone
    #           labelSelector:
    #             matchLabels:
    #               postgres-operator.crunchydata.com/cluster: pgo
    #               postgres-operator.crunchydata.com/instance-set: ha
    # containers: []
    resources:
      requests:
        cpu: 1m
        memory: 256Mi
    sidecars:
      replicaCertCopy:
        resources:
          requests:
            cpu: 1m
            memory: 32Mi
    dataVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 480Mi
      storageClassName: netapp-block-standard
    # metadata:
    #   labels: {}
    #   annotations: {}
    # minAvailable: 1
    # priorityClassName: postgres-ha
    # tolerations: []
    # topologySpreadConstraints: []
    # volumes:
    #   additional: []
    # walVolumeClaimSpec:
    #   accessModes:
    #     - ReadWriteOnce
    #   resources:
    #     requests:
    #       storage: 240Mi
    #   storageClassName: netapp-block-standard

# --- Backup Configuration (pgBackRest) ---
# Maps to spec.backups.pgbackrest in the Crunchy PostgresCluster CRD.
# Keep repo-specific settings next to each repo entry.
# The template derives pgBackRest global keys such as <repo>-path and
# <repo>-retention-full automatically from each repo definition.
# values.pgBackRest.global is reserved for advanced raw overrides and wins over
# any auto-derived repo-specific keys when both are present.
pgBackRest:
  image:
  # configuration:
  #   - secret:
  #       name: pgbackrest-extra-config
  # global:
  #   process-max: "2" # advanced raw pgBackRest global overrides
  repos:
    - name: repo1
      retention:
        full: "2"
        fullType: count
      volume:
        volumeClaimSpec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 240Mi
          storageClassName: netapp-file-standard
      schedules:
        full: 0 8 * * *
        incremental: 0 0,4,12,16,20 * * *
    - name: repo2
      enabled: false
      # The secret 's3-creds-secret' must contain a key named 's3.conf' with:
      # [global]
      # repo2-s3-key=<access-key>
      # repo2-s3-key-secret=<secret-key>
      # repo2-cipher-pass=<passphrase>
      secretName: s3-creds-secret # pragma: allowlist secret
      retention:
        full: "30"
        fullType: full
      path: /backups/cluster
      uriStyle: host
      s3:
        bucket: my-bucket
        endpoint: s3.ca-central-1.amazonaws.com
        region: ca-central-1
      schedules:
        full: 0 8 * * *
        incremental: 0 0,4,12,16,20 * * *

  repoHost:
    # affinity: {}
    resources:
      requests:
        cpu: 1m
        memory: 64Mi
    # tolerations: []

  sidecars:
    pgbackrest:
      resources:
        requests:
          cpu: 1m
          memory: 64Mi
    pgbackrestConfig:
      resources:
        requests:
          cpu: 1m
          memory: 64Mi
  # jobs:
  #   priorityClassName: postgres-backup
  # log:
  #   level: info
  # manual: {}
  # metadata:
  #   labels: {}
  # restore: {}

