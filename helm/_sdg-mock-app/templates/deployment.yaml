apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "_sdg.fullname" . }}
  labels:
    {{- include "_sdg.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "_sdg.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "_sdg.labels" . | nindent 8 }}
    spec:
      {{- with (default .Values.serviceAccountName ((.Values.global).serviceAccountName)) }}
      serviceAccountName: {{ . }}
      {{- end }}
      securityContext:
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PLAYGROUND_DB_PATH
              value: /app/data/playgrounds.db
            {{- range $key, $value := .Values.env }}
            - name: {{ $key | quote }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "_sdg.fullname" . }}
