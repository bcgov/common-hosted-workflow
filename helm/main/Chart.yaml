apiVersion: v2
name: main
description: A Helm chart for Kubernetes
type: application
version: 0.1.0
appVersion: '0.1.0'
dependencies:
  - name: n8n
    version: '0.1.0'
    repository: 'file://../_n8n'
    condition: n8n.enabled
  - name: pgo
    version: '0.1.0'
    repository: 'file://../_pgo'
    condition: pgo.enabled
  - name: postgresql
    version: 18.7.8
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 25.5.3
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: sdg-mock-app
    version: '0.1.0'
    repository: 'file://../_sdg-mock-app'
    condition: sdg-mock-app.enabled
  - name: dns-probe
    version: '0.1.0'
    repository: 'file://../_dns-probe'
    condition: dns-probe.enabled
  - name: backup-storage
    version: '0.1.18'
    repository: 'https://bcgov.github.io/helm-charts'
    condition: backup-storage.enabled
  - name: alloy
    version: '1.10.1'
    repository: 'https://grafana.github.io/helm-charts'
    condition: alloy.enabled
  - name: loki
    version: '7.0.0'
    repository: 'https://grafana.github.io/helm-charts'
    condition: loki.enabled
  - name: tempo
    version: '1.24.4'
    repository: 'https://grafana.github.io/helm-charts'
    condition: tempo.enabled
  - name: mimir
    version: '0.1.0'
    repository: 'file://../_mimir'
    condition: mimir.enabled
  - name: grafana
    version: '10.5.15'
    repository: 'https://grafana.github.io/helm-charts'
    condition: grafana.enabled
