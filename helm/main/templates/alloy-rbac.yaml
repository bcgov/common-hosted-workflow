{{- if .Values.alloy.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "_.fullname" . }}-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "_.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, namespaces, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [apps, extensions]
    resources: [replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "_.fullname" . }}-alloy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "_.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "_.fullname" . }}-alloy
subjects:
  - kind: ServiceAccount
    name: {{ include "_.fullname" . }}-alloy
    namespace: {{ .Release.Namespace }}
{{- end }}
