{{- if and .Values.seaweedfs.enabled .Values.seaweedfs.s3CrossNamespaceAccess.enabled .Values.seaweedfs.s3CrossNamespaceAccess.namespaces }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "_.fullname" . }}-seaweedfs-s3-cross-namespace
  labels:
    {{- include "_.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  {{- range .Values.seaweedfs.s3CrossNamespaceAccess.namespaces }}
                  - {{ . | quote }}
                  {{- end }}
      ports:
        - port: 8333
          protocol: TCP
{{- end }}
