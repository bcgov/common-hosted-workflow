n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://dev-chwf.apps.golddr.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER_URL: https://dev.loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://dev-chwf.apps.golddr.devops.gov.bc.ca/rest/auth/oidc/callback
    EXTERNAL_UI_ENABLED: 'true'
    UI_OIDC_ISSUER: https://dev.loginproxy.gov.bc.ca/auth/realms/standard
    UI_OIDC_REDIRECT_URI: https://dev-chwf.apps.golddr.devops.gov.bc.ca/ui/auth/callback
    UI_OIDC_POST_LOGOUT_URI: https://dev-chwf.apps.golddr.devops.gov.bc.ca/ui
    UI_OIDC_JWKS_URI: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/certs
    UI_OIDC_EXPECTED_ISSUER: https://dev.loginproxy.gov.bc.ca/auth/realms/standard

  route:
    enabled: true
    host: dev-chwf.apps.golddr.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 512Mi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *
