n8n:
  enabled: true
  env:
    WEBHOOK_URL: https://n8n.developer.gov.bc.ca
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER: https://loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/rest/auth/oidc/callback
    UI_OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/ui-api/auth/callback
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:prod:"
    AUTHZ_ENVIRONMENT: prod
    CHEFS_GATEWAY_URL: https://submit.digital.gov.bc.ca/app/gateway/v1

  route:
    enabled: true
    host: prod-chwf.apps.gold.devops.gov.bc.ca

  main:
    deploymentStrategy:
      type: "RollingUpdate"

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true

  instances:
    dataVolumeClaimSpec:
      storage: 2Gi

  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 1Gi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: "0 2 * * *"                  # Heavy routine at 2:00 AM daily (Lowest traffic window)
          incremental: "0 */4 * * *"         # Frequency protection every 4 hours, every day

      - name: repo2
        enabled: true
        type: s3
        secretName: objectstorage-creds # pragma: allowlist secret
        retention: "30"
        retentionType: time
        s3:
          bucket: workflow-prod
          endpoint: commonservices.objectstore.gov.bc.ca
          region: ca-central-1
          path: /backups/pgo
          uriStyle: path
        schedules:
          full: "0 2 * * *"                  # Heavy routine at 2:00 AM daily (Lowest traffic window)
          incremental: "0 */4 * * *"         # Frequency protection every 4 hours, every day

  dataSource:
    enabled: false
    repo:
      s3:
        bucket: workflow-prod

backup-storage:
  enabled: true

  persistence:
    backup:
      claimName: chwf-pgdump-backup
      size: 256Mi
      storageClassName: netapp-file-standard
    verification:
      claimName: chwf-pgdump-verify
      size: 256Mi
      storageClassName: netapp-file-standard
      mountPath: /var/lib/pgsql/data

  db:
    enabled: true
    secretName: chwf-pgo-pguser-n8n  # pragma: allowlist secret
    usernameKey: user
    passwordKey: password  # pragma: allowlist secret

  env:
    NUM_BACKUPS:
      value: "2"
    DAILY_BACKUPS:
      value: "1"
    WEEKLY_BACKUPS:
      value: "1"
    MONTHLY_BACKUPS:
      value: "1"
    BACKUP_STRATEGY:
      value: "rolling"
    S3_USER:
      existingSecret:
        name: chwf-pgdump-s3-creds  # pragma: allowlist secret
        key: s3-user
    S3_PASSWORD:
      existingSecret:
        name: chwf-pgdump-s3-creds  # pragma: allowlist secret
        key: s3-password
    S3_ENDPOINT:
      value: https://commonservices.objectstore.gov.bc.ca
    S3_BUCKET:
      value: workflow-prod/backups/pgdump/
    S3_PRUNE_BACKUPS:
      value: "false"

  backupConfig: |
    postgres=chwf-pgo-primary:5432/n8n

    0 * * * * default ./backup.sh -s
