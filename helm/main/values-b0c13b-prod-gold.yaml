n8n:
  enabled: true
  env:
    WEBHOOK_URL: https://n8n.developer.gov.bc.ca
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER: https://loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/rest/auth/oidc/callback
    UI_OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/ui-api/auth/callback
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:prod:"
    AUTHZ_ENVIRONMENT: prod
    CHEFS_BASE_URL: https://submit.digital.gov.bc.ca

  route:
    enabled: true
    host: prod-chwf.apps.gold.devops.gov.bc.ca

  main:
    deploymentStrategy:
      type: "RollingUpdate"

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true

  instances:
    dataVolumeClaimSpec:
      storage: 2Gi

  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 1Gi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: "0 2 * * *"                  # Heavy routine at 2:00 AM daily (Lowest traffic window)
          incremental: "0 */4 * * *"         # Frequency protection every 4 hours, every day

      - name: repo2
        enabled: true
        type: s3
        secretName: chwf-pgo-s3 # pragma: allowlist secret
        retention: "30"
        retentionType: time
        s3:
          bucket: workflow-prod
          endpoint: commonservices.objectstore.gov.bc.ca
          region: ca-central-1
          path: /backups/pgo
          uriStyle: path
        schedules:
          full: "0 2 * * *"                  # Heavy routine at 2:00 AM daily (Lowest traffic window)
          incremental: "0 */4 * * *"         # Frequency protection every 4 hours, every day

  dataSource:
    enabled: false
    repo:
      s3:
        bucket: workflow-prod

backup-storage:
  enabled: true

  image:
    tag: "2.13.0"
    pullPolicy: IfNotPresent

  env:
    S3_BUCKET:
      value: workflow-prod/backups/pgdump/

  backupConfig: |
    postgres=chwf-pgo-replicas:5432/n8n

    */10 * * * * default ./backup.sh -s
    0 2 * * * default ./backup.sh -s -v all
