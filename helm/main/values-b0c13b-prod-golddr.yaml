n8n:
  enabled: true
  env:
    WEBHOOK_URL: https://n8n.developer.gov.bc.ca
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER: https://loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/rest/auth/oidc/callback
    UI_OIDC_REDIRECT_URI: https://n8n.developer.gov.bc.ca/ui-api/auth/callback
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:prod:"
    CHEFS_GATEWAY_URL: https://submit.digital.gov.bc.ca/app/gateway/v1

  route:
    enabled: true
    host: prod-chwf.apps.golddr.devops.gov.bc.ca

  main:
    deploymentStrategy:
      type: "RollingUpdate"

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true

  instances:
    dataVolumeClaimSpec:
      storage: 2Gi

  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 1Gi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *
  dataSource:
    enabled: false
    repo:
      s3:
        bucket: workflow-prod

  conditionalRestore:
    enabled: false  # enable when dns-probe is enabled for prod-golddr
    dnsProbStatusUrl: "http://chwf-dns-probe:8000/status"
    s3:
      endpoint: https://commonservices.objectstore.gov.bc.ca
      bucket: workflow-prod/backups/pgdump
      secretName: chwf-pgdump-s3-creds  # pragma: allowlist secret
    db:
      secretName: chwf-pgo-pguser-n8n  # pragma: allowlist secret

# backup-storage is intentionally disabled on GoldDR — backups are created on Gold only
backup-storage:
  enabled: false

dns-probe:
  enabled: false
  env:
    APP_ENV: "production"
