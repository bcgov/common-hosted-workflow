n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://test-chwf.apps.gold.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER: https://test.loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://test-chwf.apps.gold.devops.gov.bc.ca/rest/auth/oidc/callback
    UI_OIDC_REDIRECT_URI: https://test-chwf.apps.gold.devops.gov.bc.ca/ui-api/auth/callback
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:test:"
    AUTHZ_ENVIRONMENT: test
    CHEFS_GATEWAY_URL: https://chefs-test.apps.silver.devops.gov.bc.ca/app/gateway/v1

  route:
    enabled: true
    host: test-chwf.apps.gold.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 512Mi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: "0 3 * * 1-5"             # Full database refresh and log purge at 3:00 AM (Mon-Fri)
          incremental: "30 22 * * 1-5"    # Nightly automation/test sweep at 10:30 PM (Mon-Fri)
      - name: repo2
        enabled: true
        type: s3
        secretName: objectstorage-creds # pragma: allowlist secret
        retention: "30"
        retentionType: time
        s3:
          bucket: workflow-test
          endpoint: commonservices.objectstore.gov.bc.ca
          region: ca-central-1
          path: /backups/pgo
          uriStyle: path
        schedules:
          full: "0 3 * * 1-5"             # Full database refresh and log purge at 3:00 AM (Mon-Fri)
          incremental: "30 22 * * 1-5"    # Nightly automation/test sweep at 10:30 PM (Mon-Fri)
  dataSource:
    enabled: false
    repo:
      s3:
        bucket: workflow-test

backup-storage:
  enabled: true

  persistence:
    backup:
      claimName: chwf-pgdump-backup
      size: 256Mi
      storageClassName: netapp-file-standard
    verification:
      claimName: chwf-pgdump-verify
      size: 256Mi
      storageClassName: netapp-file-standard
      mountPath: /var/lib/pgsql/data

  db:
    enabled: true
    secretName: chwf-pgo-pguser-n8n  # pragma: allowlist secret
    usernameKey: user
    passwordKey: password  # pragma: allowlist secret

  env:
    NUM_BACKUPS:
      value: "2"
    DAILY_BACKUPS:
      value: "1"
    WEEKLY_BACKUPS:
      value: "1"
    MONTHLY_BACKUPS:
      value: "1"
    BACKUP_STRATEGY:
      value: "rolling"
    S3_USER:
      existingSecret:
        name: chwf-pgdump-s3-creds  # pragma: allowlist secret
        key: s3-user
    S3_PASSWORD:
      existingSecret:
        name: chwf-pgdump-s3-creds  # pragma: allowlist secret
        key: s3-password
    S3_ENDPOINT:
      value: https://commonservices.objectstore.gov.bc.ca
    S3_BUCKET:
      value: workflow-test/backups/pgdump/
    S3_PRUNE_BACKUPS:
      value: "false"

  backupConfig: |
    postgres=chwf-pgo-primary:5432/n8n

    0 * * * * default ./backup.sh -s
