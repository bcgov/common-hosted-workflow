n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://test-chwf.apps.golddr.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    OIDC_ISSUER: https://test.loginproxy.gov.bc.ca/auth/realms/standard
    OIDC_REDIRECT_URI: https://test-chwf.apps.golddr.devops.gov.bc.ca/rest/auth/oidc/callback
    AUTHZ_ENVIRONMENT: test
    UI_OIDC_REDIRECT_URI: https://test-chwf.apps.golddr.devops.gov.bc.ca/ui-api/auth/callback
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:test:"
    CHEFS_GATEWAY_URL: https://chefs-test.apps.silver.devops.gov.bc.ca/app/gateway/v1

  route:
    enabled: true
    host: test-chwf.apps.golddr.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 512Mi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *
  dataSource:
    enabled: false
    repo:
      s3:
        bucket: workflow-test

  conditionalRestore:
    enabled: false  # enable when dns-probe is enabled for test-golddr
    s3:
      bucket: workflow-test/backups/pgdump
    databases:
      - secretName: chwf-pgo-pguser-n8n # pragma: allowlist secret
      - secretName: chwf-pgo-pguser-n8n-custom # pragma: allowlist secret

# backup-storage is intentionally disabled on GoldDR — backups are created on Gold only
backup-storage:
  enabled: false

dns-probe:
  enabled: false
  env:
    APP_ENV: "test"
