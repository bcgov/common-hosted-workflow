n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://test-chwf.apps.golddr.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://test-chwf.apps.golddr.devops.gov.bc.ca
    OIDC_ISSUER: https://test.loginproxy.gov.bc.ca/auth/realms/standard
    AUTHZ_ENVIRONMENT: test
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:test:"
    CHEFS_BASE_URL: https://chefs-test.apps.silver.devops.gov.bc.ca

  route:
    enabled: true
    host: test-chwf.apps.golddr.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
  conditionalRestore:
    enabled: false  # enable when dns-probe is enabled for test-golddr
    s3:
      bucket: workflow-test/backups/pgdump

# backup-storage is intentionally disabled on GoldDR — backups are created on Gold only
backup-storage:
  enabled: false

dns-probe:
  enabled: false
  env:
    APP_ENV: "test"
