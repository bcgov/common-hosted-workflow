n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://dev-workflow.apps.gold.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://dev-workflow.apps.gold.devops.gov.bc.ca
    OIDC_ISSUER: https://dev.loginproxy.gov.bc.ca/auth/realms/standard
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:dev:"
    CHEFS_BASE_URL: https://chefs-dev.apps.silver.devops.gov.bc.ca
    FEATURES_ENABLED: "wil, project, workflow-share, tenant-project-sync"
    CSTAR_BASE_URL: https://dev.connect.digital.gov.bc.ca

  route:
    enabled: true
    host: dev-workflow.apps.gold.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

postgresql:
  enabled: false

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        retention:
          full: "2"
          fullType: count
        volume:
          volumeClaimSpec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 512Mi
            storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *

sdg-mock-app:
  enabled: true
  route:
    enabled: true
    host: dev-workflow-mock.apps.gold.devops.gov.bc.ca
  persistence:
    size: 512Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi

loki:
  enabled: true
  loki:
    storage:
      bucketNames:
        chunks: dev-loki
        ruler: dev-loki-ruler
      s3:
        endpoint: http://chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
  singleBinary:
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

tempo:
  enabled: true
  tempo:
    storage:
      trace:
        s3:
          bucket: dev-tempo
          endpoint: chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

mimir:
  enabled: true
  storage:
    s3:
      endpoint: chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
      blocksBucket: dev-mimir-blocks
      alertmanagerBucket: dev-mimir-alertmanager
      rulerBucket: dev-mimir-ruler
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mimir-distributed:
  enabled: false  # Too resource-intensive (11 components)

grafanaRoute:
  enabled: true
  host: dev-grafana.apps.gold.devops.gov.bc.ca

grafana:
  enabled: true
  grafana.ini:
    server:
      root_url: https://dev-grafana.apps.gold.devops.gov.bc.ca
    auth.generic_oauth:
      auth_url: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/auth
      token_url: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/token
      api_url: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/userinfo
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

alloy:
  enabled: true
  alloy:
    configMap:
      content: ""
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
