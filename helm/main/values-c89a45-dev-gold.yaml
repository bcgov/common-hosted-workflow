n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://dev-chwf-sdg.apps.gold.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://dev-chwf-sdg.apps.gold.devops.gov.bc.ca
    OIDC_ISSUER: https://dev.loginproxy.gov.bc.ca/auth/realms/standard
    EXTERNAL_UI_ENABLED: 'true'
    UI_OIDC_REDIS_PREFIX: "chwf:ui-oidc:dev:"
    CHEFS_BASE_URL: https://chefs-dev.apps.silver.devops.gov.bc.ca
    CSTAR_BASE_URL: https://dev-chwf-sdg-mock.apps.gold.devops.gov.bc.ca
    IS_TENANT_PROJECT_SYNC_ENABLED: "true"

  route:
    enabled: true
    host: dev-chwf-sdg.apps.gold.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

postgresql:
  enabled: false

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        enabled: true
        type: volume
        retention: "2"
        retentionType: count
        volume:
          size: 512Mi
          accessModes: ReadWriteOnce
          storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *

sdg-mock-app:
  enabled: true
  route:
    enabled: true
    host: dev-chwf-sdg-mock.apps.gold.devops.gov.bc.ca
  persistence:
    size: 512Mi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi
