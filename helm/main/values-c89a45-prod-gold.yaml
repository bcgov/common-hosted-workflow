n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://workflow.apps.gold.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://workflow.apps.gold.devops.gov.bc.ca
    OIDC_ISSUER: https://loginproxy.gov.bc.ca/auth/realms/standard
    CHEFS_GATEWAY_URL: https://submit.digital.gov.bc.ca/app/gateway/v1
    CHEFS_BASE_URL: https://submit.digital.gov.bc.ca
    CSTAR_BASE_URL: https://connect.digital.gov.bc.ca
    FEATURES_ENABLED: "wil, project, workflow-share, tenant-project-sync"

  route:
    enabled: true
    host: workflow.apps.gold.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  instance:
    dataVolumeClaimSpec:
      resources:
        requests:
          storage: 2Gi
  pgBackRest:
    repos:
      - name: repo1
        retention:
          full: "2"
          fullType: count
        volume:
          volumeClaimSpec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *

loki:
  enabled: false
  loki:
    storage:
      bucketNames:
        chunks: prod-loki
        ruler: prod-loki-ruler
      s3:
        endpoint: http://chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
  singleBinary:
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

tempo:
  enabled: false
  tempo:
    storage:
      trace:
        s3:
          bucket: prod-tempo
          endpoint: chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

mimir:
  enabled: false
  storage:
    s3:
      endpoint: chwf-seaweedfs-s3.c89a45-tools.svc.cluster.local:8333
      blocksBucket: prod-mimir-blocks
      alertmanagerBucket: prod-mimir-alertmanager
      rulerBucket: prod-mimir-ruler
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

grafana:
  chwfRoute:
    enabled: true
    host: grafana-workflow.apps.gold.devops.gov.bc.ca
  enabled: false
  grafana.ini:
    server:
      root_url: https://grafana-workflow.apps.gold.devops.gov.bc.ca
    auth.generic_oauth:
      auth_url: https://loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/auth
      token_url: https://loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/token
      api_url: https://loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/userinfo
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

alloy:
  enabled: false
  alloy:
    configMap:
      content: ""
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
