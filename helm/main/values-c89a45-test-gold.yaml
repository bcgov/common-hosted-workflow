n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://test-workflow.apps.gold.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://test-workflow.apps.gold.devops.gov.bc.ca
    OIDC_ISSUER: https://test.loginproxy.gov.bc.ca/auth/realms/standard
    CHEFS_GATEWAY_URL: https://chefs-test.apps.silver.devops.gov.bc.ca/app/gateway/v1
    CHEFS_BASE_URL: https://chefs-test.apps.silver.devops.gov.bc.ca
    CSTAR_BASE_URL: https://test.connect.digital.gov.bc.ca
    FEATURES_ENABLED: "wil, project, workflow-share, tenant-project-sync"

  route:
    enabled: true
    host: test-workflow.apps.gold.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  pgBackRest:
    repos:
      - name: repo1
        retention:
          full: "2"
          fullType: count
        volume:
          volumeClaimSpec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 512Mi
            storageClassName: netapp-file-standard
        schedules:
          full: 0 8 * * *
          incremental: 0 0,4,12,16,20 * * *
