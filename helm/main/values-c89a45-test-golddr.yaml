n8n:
  enabled: true
  env:
    WEBHOOK_URL: "https://test-workflow.apps.golddr.devops.gov.bc.ca"
    N8N_SMTP_HOST: "apps.smtp.gov.bc.ca"
    N8N_SMTP_PORT: "25"
    N8N_SMTP_SSL: "false"
    N8N_SMTP_AUTHTYPE: "NONE"
    N8N_SMTP_USER: ""
    N8N_SMTP_PASS: ""
    N8N_SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    N8N_BASE_URL: https://test-workflow.apps.golddr.devops.gov.bc.ca
    OIDC_ISSUER: https://test.loginproxy.gov.bc.ca/auth/realms/standard
    CHEFS_GATEWAY_URL: https://chefs-test.apps.silver.devops.gov.bc.ca/app/gateway/v1
    CHEFS_BASE_URL: https://chefs-test.apps.silver.devops.gov.bc.ca
    CSTAR_BASE_URL: https://test.connect.digital.gov.bc.ca

  route:
    enabled: true
    host: test-workflow.apps.golddr.devops.gov.bc.ca

  worker:
    enabled: true

  webhook:
    enabled: true

  runner:
    enabled: true

redis:
  enabled: true

pgo:
  enabled: true
  instance:
    dataVolumeClaimSpec:
      resources:
        requests:
          storage: 1.5Gi
  pgBackRest:

dns-probe:
  enabled: false
  env:
    APP_ENV: "test"
