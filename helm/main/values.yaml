# See https://helm.sh/docs/chart_template_guide/subcharts_and_globals/#global-chart-values
global:
  security:
    allowInsecureImages: true
  serviceAccountName:

nameOverride: chwf
fullnameOverride: chwf

# See https://github.com/8gears/n8n-helm-chart/blob/main/charts/n8n/values.yaml
n8n:
  enabled: false

  nameOverride: chwf-n8n
  fullnameOverride: chwf-n8n

  image:
    repository: ghcr.io/bcgov/chwf
    tag: main
    pullPolicy: IfNotPresent

  customDatabase:
    secretName: chwf-pgo-pguser-n8n-custom # pragma: allowlist secret

  env:
    # See https://docs.n8n.io/hosting/configuration/supported-databases-settings/#postgresdb
    DB_TYPE: "postgresdb"
    # DB_POSTGRESDB_DATABASE: "n8n"
    # DB_POSTGRESDB_HOST: "chwf-postgresql"
    # DB_POSTGRESDB_PORT: "5432"
    # DB_POSTGRESDB_USER: "nonroot"
    DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "true"
    # WATCH: https://github.com/n8n-io/n8n/issues/25705
    DB_POSTGRESDB_STATEMENT_TIMEOUT: "0"
    # DB_POSTGRESDB_PASSWORD (default: empty)
    # See https://docs.n8n.io/hosting/configuration/configuration-examples/user-folder/#specify-user-folder-path
    N8N_BLOCKLIST_FUNCTIONS_ALLOW_BUILTIN: "*"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/binary-data/#binary-data-environment-variables
    N8N_DEFAULT_BINARY_DATA_MODE: "filesystem"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/security/#security-environment-variables
    N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
    N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
    N8N_GIT_NODE_DISABLE_BARE_REPOS: "false"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/task-runners/#n8n-instance-environment-variables
    N8N_RUNNERS_MODE: "external"
    N8N_RUNNERS_BROKER_LISTEN_ADDRESS: "0.0.0.0"
    # See https://docs.n8n.io/hosting/scaling/concurrency-control/#self-hosted-concurrency-control
    N8N_CONCURRENCY_PRODUCTION_LIMIT: "-1"
    # See https://docs.n8n.io/hosting/configuration/task-runners/#setting-up-external-mode
    N8N_NATIVE_PYTHON_RUNNER: "true"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/queue-mode/#queue-mode-environment-variables
    OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
    QUEUE_BULL_PREFIX: ""
    QUEUE_BULL_REDIS_HOST: "chwf-redis-master"
    QUEUE_BULL_REDIS_PORT: "6379"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/executions/#executions-environment-variables
    EXECUTIONS_MODE: "queue" # worker.enabled = true
    EXECUTIONS_DATA_PRUNE: "true"
    EXECUTIONS_DATA_MAX_AGE: "336"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/user-management-smtp-2fa/
    N8N_EMAIL_MODE: "smtp"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/licenses
    N8N_HIDE_USAGE_PAGE: "false"
    N8N_LICENSE_AUTO_RENEW_ENABLED: "false"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/insights/#insights-environment-variables
    N8N_DISABLED_MODULES: "external-secrets,mcp,chat-hub"
    # Feature flags — comma-separated list of enabled features
    FEATURES_ENABLED: "tenant-project-sync"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/timezone-localization/
    GENERIC_TIMEZONE: "America/Vancouver"
    # See https://docs.n8n.io/hosting/configuration/environment-variables/deployment
    N8N_TEMPLATES_ENABLED: "false"
    N8N_PERSONALIZATION_ENABLED: "false"
    N8N_DIAGNOSTICS_ENABLED: "false"
    N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    N8N_HIRING_BANNER_ENABLED: "false"
    N8N_PUBLIC_API_SWAGGERUI_DISABLED: "true"
    # See https://docs.n8n.io/deploy/host-n8n/configure-n8n/basic-configuration/use-environment-variables/scheduler#enable-vars
    N8N_SCHEDULER_ENABLED: "true"
    # Extra
    N8N_WORKER_SERVER_ADDRESS: "0.0.0.0"
    N8N_BLOCK_FS_WRITE_ACCESS: "true"
    N8N_HIDE_ACTIVATION_ALERT: "true"
    N8N_HIDE_HIDE_GITHUB_STAR_BUTTON: "true"
    N8N_AI_ENABLED: "false"
    UI_OIDC_REDIS_URL: redis://chwf-redis-master:6379
    AUTHZ_SERVICE_URL: https://api.loginproxy.gov.bc.ca/api/v1
    AUTHZ_TOKEN_ENDPOINT: https://loginproxy.gov.bc.ca/auth/realms/standard/protocol/openid-connect/token
    EXTERNAL_UI_ENABLED: 'true'

  extraEnv:
    DB_POSTGRESDB_DATABASE:
      valueFrom:
        secretKeyRef:
          name: chwf-pgo-pguser-n8n
          key: dbname
    DB_POSTGRESDB_HOST:
      valueFrom:
        secretKeyRef:
          name: chwf-pgo-pguser-n8n
          key: pgbouncer-host
    DB_POSTGRESDB_PORT:
      valueFrom:
        secretKeyRef:
          name: chwf-pgo-pguser-n8n
          key: pgbouncer-port
    DB_POSTGRESDB_USER:
      valueFrom:
        secretKeyRef:
          name: chwf-pgo-pguser-n8n
          key: user
    DB_POSTGRESDB_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: chwf-pgo-pguser-n8n
          key: password
    # DB_POSTGRESDB_PASSWORD:
    #   valueFrom:
    #     secretKeyRef:
    #       name: chwf-postgresql
    #       key: user-password
    QUEUE_BULL_REDIS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: chwf-redis
          key: redis-password
    UI_OIDC_REDIS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: chwf-redis
          key: redis-password
  main:
    env:
      OIDC_ROLES_CLAIM: client_roles
      ENABLE_SWAGGER_UI: 'false'

    envSecretName: chwf # pragma: allowlist secret

    resources:
      requests:
        cpu: 300m
        memory: 576Mi
      limits:
        cpu: 500m
        memory: 1Gi

  worker:
    enabled: true

    envSecretName: chwf # pragma: allowlist secret

    resources:
      requests:
        cpu: 300m
        memory: 576Mi
      limits:
        cpu: 500m
        memory: 1Gi

  webhook:
    enabled: false

    env:
      OIDC_ROLES_CLAIM: client_roles

    envSecretName: chwf # pragma: allowlist secret

    resources:
      requests:
        cpu: 300m
        memory: 576Mi
      limits:
        cpu: 500m
        memory: 1Gi

  runner:
    enabled: false

    image:
      repository: n8nio/runners
      tag: 2.31.2
      pullPolicy: IfNotPresent

    env:
      N8N_RUNNERS_MAX_CONCURRENCY: "20"
      N8N_BLOCK_FS_WRITE_ACCESS: "true"

    resources:
      requests:
        cpu: 400m
        memory: 768Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # Nodes disabled in all environments.
  baseExcludedNodes:
    - "n8n-nodes-base.executeCommand" # Execute Command — no shell access in containers
    - "n8n-nodes-base.readWriteFile" # Read/Write Files from Disk — no persistent local filesystem in containers

  # Additional nodes to exclude on top of baseExcludedNodes.
  extraExcludedNodes: []

  persistence:
    size: 2Gi

  route:
    host:

# See https://github.com/bitnami/charts/tree/main/bitnami/postgresql
postgresql:
  enabled: false

  image:
    registry: ghcr.io
    repository: egose/bitnami-postgresql
    tag: '18.1'

  primary:
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    persistence:
      size: 1Gi
  readReplicas:
    persistence:
      size: 1Gi
  global:
    postgresql:
      auth:
        database: n8n
        username: nonroot
        replicationUsername: replication
        existingSecret: chwf-postgresql # pragma: allowlist secret
        secretKeys:
          adminPasswordKey: admin-password # pragma: allowlist secret
          userPasswordKey: user-password # pragma: allowlist secret
          replicationPasswordKey: replication-password # pragma: allowlist secret

# See https://github.com/bitnami/charts/tree/main/bitnami/redis
redis:
  enabled: true
  architecture: standalone

  image:
    registry: ghcr.io
    repository: egose/bitnami-redis
    tag: '8.4.0'

  master:
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
    persistence:
      size: 1Gi
  auth:
    existingSecret: "chwf-redis" # pragma: allowlist secret
    existingSecretPasswordKey: "redis-password" # pragma: allowlist secret

pgo:
  enabled: true

  nameOverride: chwf-pgo
  fullnameOverride: chwf-pgo

  users:
  - name: n8n
    databases:
      - n8n
    options: CREATEROLE NOSUPERUSER
  - name: n8n-custom
    databases:
      - n8n-custom
    options: CREATEROLE NOSUPERUSER

  instance:
    name: ha
    replicas: 2
    resources:
      requests:
        cpu: 1m
        memory: 256Mi
    sidecars:
      replicaCertCopy:
        resources:
          requests:
            cpu: 1m
            memory: 32Mi
    dataVolumeClaimSpec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: netapp-block-standard

  dataSource:
    # pgbackrest:
    #   configuration:
    #     - secret:
    #         name: chwf-pgo-s3 # pragma: allowlist secret
    #   global:
    #     repo2-path: /backups/pgo
    #     repo2-s3-uri-style: path
    #   repo:
    #     name: repo2
    #     s3:
    #       endpoint: commonservices.objectstore.gov.bc.ca
    #       region: ca-central-1

# backup-storage — disabled by default, enabled only for gold deployments
backup-storage:
  enabled: false
  image:
    repository: ghcr.io/bcgov/backup-container
    pullPolicy: Always
    tag: latest

  persistence:
    backup:
      claimName: chwf-pgdump-backup
      size: 256Mi
      storageClassName: netapp-file-standard
    verification:
      claimName: chwf-pgdump-verify
      size: 256Mi
      storageClassName: netapp-file-standard
      mountPath: /var/lib/pgsql/data

  db:
    enabled: true
    secretName: chwf-pgo-pguser-postgres  # pragma: allowlist secret
    usernameKey: user
    passwordKey: password  # pragma: allowlist secret

  env:
    NUM_BACKUPS:
      value: "2"
    DAILY_BACKUPS:
      value: "1"
    WEEKLY_BACKUPS:
      value: "1"
    MONTHLY_BACKUPS:
      value: "1"
    BACKUP_STRATEGY:
      value: "rolling"
    S3_USER:
      existingSecret:
        name: chwf-s3-account  # pragma: allowlist secret
        key: access-key
    S3_PASSWORD:
      existingSecret:
        name: chwf-s3-account  # pragma: allowlist secret
        key: secret-key
    S3_ENDPOINT:
      value: https://commonservices.objectstore.gov.bc.ca
    S3_PRUNE_BACKUPS:
      value: "false"

# dns-probe — disabled by default, enabled only for golddr deployments
dns-probe:
  enabled: false

  nameOverride: chwf-dns-probe
  fullnameOverride: chwf-dns-probe

  image:
    repository: ghcr.io/bcgov/chwf-dns-probe
    tag: main
    pullPolicy: IfNotPresent

  envSecretName: chwf-dns-probe # pragma: allowlist secret

  env:
    APP_ENV: "production"
    SMTP_HOST: "apps.smtp.gov.bc.ca"
    SMTP_PORT: "25"
    SMTP_SENDER: "DoNotReplyCITZ@gov.bc.ca"
    POLL_INTERVAL: "5"
    ALERT_ON_STARTUP: "false"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# sdg-mock-app (Next.js + SQLite playground)
sdg-mock-app:
  enabled: false

  nameOverride: chwf-sdg-mock-app
  fullnameOverride: chwf-sdg-mock-app

  image:
    repository: ghcr.io/bcgov/chwf-sdg-mock-app
    tag: main
    pullPolicy: IfNotPresent

  route:
    enabled: false
    host:

  persistence:
    size: 1Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 250m
      memory: 512Mi
      ephemeral-storage: 256Mi

# See https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy
alloy:
  enabled: false
  rbac:
    create: false
  controller:
    type: deployment
    replicas: 1
  alloy:
    configMap:
      create: true

# See https://github.com/grafana/loki/tree/main/production/helm/loki
loki:
  enabled: false
  rbac:
    namespaced: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    podSecurityContext: null  # OpenShift assigns UID from namespace range; chart default (10001) is outside allowed range
    containerSecurityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    storage:
      type: s3
      s3:
        region: us-east-1
        accessKeyId: ${AWS_ACCESS_KEY_ID}
        secretAccessKey: ${AWS_SECRET_ACCESS_KEY} # pragma: allowlist secret
        s3ForcePathStyle: true
        insecure: true
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: false
    extraVolumes:
      - name: loki-wal
        emptyDir: {}
    extraVolumeMounts:
      - name: loki-wal
        mountPath: /var/loki
    extraEnvFrom:
      - secretRef:
          name: chwf-observability-s3 # pragma: allowlist secret
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false
  test:
    enabled: false

# See https://github.com/grafana-community/helm-charts/tree/main/charts/tempo
tempo:
  enabled: false
  securityContext: null  # OpenShift assigns UID from namespace range; chart default (10001) is outside allowed range
  extraVolumes:
    - name: tempo-wal
      emptyDir: {}
  persistence:
    enabled: false
  tempo:
    extraVolumeMounts:
      - name: tempo-wal
        mountPath: /var/tempo
    storage:
      trace:
        backend: s3
        s3:
          insecure: true
          forcepathstyle: true
    extraEnvFrom:
      - secretRef:
          name: chwf-observability-s3 # pragma: allowlist secret

# Mimir monolithic — single-binary, S3 storage, no PVC
mimir:
  enabled: false
  image:
    repository: grafana/mimir
    tag: '2.17.11'
    pullPolicy: IfNotPresent
  podSecurityContext: null  # OpenShift assigns UID from namespace range
  envSecretName: chwf-observability-s3 # pragma: allowlist secret
  storage:
    s3:
      insecure: true
      endpoint: ''
      blocksBucket: ''
      alertmanagerBucket: ''
      rulerBucket: ''

# See https://github.com/grafana-community/helm-charts/tree/main/charts/grafana
grafana:
  chwfRoute:
    enabled: false
    host:
  enabled: false
  persistence:
    enabled: false
  rbac:
    namespaced: true
  securityContext: null  # OpenShift assigns UID from namespace range; chart default (472) is outside [1003930000, 1003939999]
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile: null  # Container-level seccompProfile triggers alpha annotation rejected by OpenShift SCC
  extraEnv:
    - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: chwf # pragma: allowlist secret
          key: OIDC_CLIENT_ID
    - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: chwf # pragma: allowlist secret
          key: OIDC_CLIENT_SECRET
  grafana.ini:
    auth:
      disable_login_form: true
    auth.generic_oauth:
      enabled: true
      name: BCGov SSO
      allow_sign_up: true
      scopes: openid profile email
      role_attribute_path: "contains(client_roles[*], 'global:admin') && 'Admin' || contains(client_roles[*], 'global:member') && 'Editor' || 'Viewer'"
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: http://chwf-loki:3100 # NOSONAR - internal cluster service URL
          isDefault: false
        - name: Tempo
          type: tempo
          url: http://chwf-tempo:3200 # NOSONAR - internal cluster service URL
          isDefault: false
        - name: Mimir
          type: prometheus
          url: http://chwf-mimir:8080/prometheus # NOSONAR - internal cluster service URL
          isDefault: true
